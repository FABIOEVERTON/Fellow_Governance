<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Minha Organização Diária - Lista de Compras e Tarefas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, "Segoe UI", "Helvetica Neue", sans-serif;
      }

      body {
        background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
      }

      /* Cabeçalho */
      .header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .header h1 {
        font-size: 2.2rem;
        background: linear-gradient(135deg, #1e3c72, #2b4c7c);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
      }

      .header p {
        color: #2c3e66;
        font-weight: 500;
        margin-top: 0.5rem;
      }

      /* Layout duplo responsivo */
      .dashboard {
        display: flex;
        flex-wrap: wrap;
        gap: 1.8rem;
      }

      .card {
        flex: 1;
        min-width: 280px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(2px);
        border-radius: 2rem;
        box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
        padding: 1.5rem;
        transition: transform 0.2s ease;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h2 {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 1.7rem;
        font-weight: 700;
        margin-bottom: 1.2rem;
        padding-bottom: 0.6rem;
        border-bottom: 3px solid #ffbe76;
      }

      .compras h2 {
        border-bottom-color: #f6b26b;
        color: #b45f2b;
      }
      .tarefas h2 {
        border-bottom-color: #6c9ebf;
        color: #2c5282;
      }

      /* Formulários de adição */
      .add-form {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 1.8rem;
        flex-wrap: wrap;
      }

      .add-form input {
        flex: 2;
        padding: 0.8rem 1rem;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 2rem;
        outline: none;
        transition: all 0.2s;
        background: white;
      }

      .add-form input:focus {
        border-color: #ffb347;
        box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.3);
      }

      .add-form button {
        background: #2c3e66;
        color: white;
        border: none;
        padding: 0 1.2rem;
        border-radius: 2rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.9rem;
      }

      .add-form button:hover {
        background: #1f2c48;
        transform: scale(0.97);
      }

      /* Listas */
      .items-list {
        list-style: none;
        max-height: 420px;
        overflow-y: auto;
        margin-top: 0.5rem;
        padding-right: 0.3rem;
      }

      .items-list li {
        background: #fef9e8;
        margin: 0.6rem 0;
        padding: 0.8rem 1rem;
        border-radius: 1.2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s;
        border-left: 6px solid #ffbe76;
        word-break: break-word;
        gap: 0.8rem;
      }

      .tarefas .items-list li {
        border-left-color: #6c9ebf;
        background: #f1f7fd;
      }

      .item-content {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        flex: 1;
        cursor: pointer;
      }

      .item-text {
        font-size: 1rem;
        font-weight: 500;
        transition: 0.1s;
      }

      /* Checkbox personalizado */
      .custom-check {
        width: 22px;
        height: 22px;
        accent-color: #4c9a2a;
        cursor: pointer;
        transform: scale(1);
      }

      /* Quando concluído */
      .completed .item-text {
        text-decoration: line-through;
        color: #7f8c8d;
        opacity: 0.7;
      }

      /* Botão excluir */
      .delete-btn {
        background: transparent;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        color: #c44536;
        font-weight: bold;
        width: 32px;
        height: 32px;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }

      .delete-btn:hover {
        background: #ffe0db;
        transform: scale(1.1);
        color: #a00;
      }

      /* Ações rápidas */
      .actions-bar {
        display: flex;
        justify-content: space-between;
        margin-top: 1.5rem;
        gap: 0.8rem;
        flex-wrap: wrap;
      }

      .btn-secondary {
        background: #e2e8f0;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.8rem;
        transition: 0.2s;
        color: #2d3748;
      }

      .btn-secondary:hover {
        background: #cbd5e0;
      }

      .badge {
        background: #ecf0f1;
        padding: 0.2rem 0.7rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
        color: #2c3e66;
      }

      footer {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #2c3e66;
      }

      @media (max-width: 780px) {
        .card h2 {
          font-size: 1.4rem;
        }
        .add-form input {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🏡 Casa Organizada</h1>
        <p>🛒 Compras + ✅ Tarefas do dia — Tudo num só lugar</p>
      </div>

      <div class="dashboard">
        <!-- COLUNA LISTA DE COMPRAS -->
        <div class="card compras">
          <h2>🛒 Lista de Compras</h2>
          <div class="add-form">
            <input
              type="text"
              id="novoItemCompra"
              placeholder="Ex: Leite, Pão, Frutas..."
              autocomplete="off"
            />
            <button id="btnAddCompra">+ Adicionar</button>
          </div>
          <ul id="listaCompras" class="items-list"></ul>
          <div class="actions-bar">
            <button id="removerCompradosCompra" class="btn-secondary">
              🗑️ Remover comprados
            </button>
            <button id="limparTodasCompras" class="btn-secondary">
              ⚠️ Limpar tudo
            </button>
          </div>
          <div class="badge" style="margin-top: 12px; display: inline-block">
            ✔️ Marque o que já comprou
          </div>
        </div>

        <!-- COLUNA TAREFAS DO DIA -->
        <div class="card tarefas">
          <h2>📋 Tarefas do Dia</h2>
          <div class="add-form">
            <input
              type="text"
              id="novaTarefa"
              placeholder="Ex: Lavar louça, Pagar conta..."
              autocomplete="off"
            />
            <button id="btnAddTarefa">+ Adicionar</button>
          </div>
          <ul id="listaTarefas" class="items-list"></ul>
          <div class="actions-bar">
            <button id="removerConcluidasTarefa" class="btn-secondary">
              ✔️ Remover concluídas
            </button>
            <button id="limparTodasTarefas" class="btn-secondary">
              ⚠️ Limpar tudo
            </button>
          </div>
          <div class="badge" style="margin-top: 12px">
            ✨ Marque as tarefas que já fez
          </div>
        </div>
      </div>
      <footer>
        💾 Os dados são salvos automaticamente no seu navegador (localStorage)
      </footer>
    </div>

    <script>
      // ---------- MODEL (estrutura) ----------
      let compras = []; // cada item: { id, nome, concluido }
      let tarefas = []; // cada item: { id, nome, concluido }

      // Elementos DOM
      const comprasListEl = document.getElementById("listaCompras");
      const tarefasListEl = document.getElementById("listaTarefas");
      const inputCompra = document.getElementById("novoItemCompra");
      const inputTarefa = document.getElementById("novaTarefa");
      const btnAddCompra = document.getElementById("btnAddCompra");
      const btnAddTarefa = document.getElementById("btnAddTarefa");
      const btnRemoverCompradosCompra = document.getElementById(
        "removerCompradosCompra",
      );
      const btnLimparCompras = document.getElementById("limparTodasCompras");
      const btnRemoverConcluidasTarefa = document.getElementById(
        "removerConcluidasTarefa",
      );
      const btnLimparTarefas = document.getElementById("limparTodasTarefas");

      // ID generator simples
      function gerarId() {
        return Date.now() + Math.random().toString(36).substring(2, 6);
      }

      // Carregar do localStorage
      function carregarDados() {
        const comprasSalvas = localStorage.getItem("lista_compras_casa");
        const tarefasSalvas = localStorage.getItem("lista_tarefas_casa");

        if (comprasSalvas) {
          try {
            compras = JSON.parse(comprasSalvas);
          } catch (e) {
            compras = [];
          }
        }
        if (tarefasSalvas) {
          try {
            tarefas = JSON.parse(tarefasSalvas);
          } catch (e) {
            tarefas = [];
          }
        }

        // garantir estrutura
        if (!compras) compras = [];
        if (!tarefas) tarefas = [];
      }

      // Salvar no localStorage
      function salvarCompras() {
        localStorage.setItem("lista_compras_casa", JSON.stringify(compras));
      }

      function salvarTarefas() {
        localStorage.setItem("lista_tarefas_casa", JSON.stringify(tarefas));
      }

      // Renderizar COMPRAS
      function renderizarCompras() {
        if (!comprasListEl) return;
        if (compras.length === 0) {
          comprasListEl.innerHTML =
            '<li style="justify-content:center; background:#f1f2f6; border-left-color:#ccc;">✨ Nenhum item. Adicione acima.</li>';
          return;
        }

        comprasListEl.innerHTML = "";
        compras.forEach((item) => {
          const li = document.createElement("li");
          if (item.concluido) li.classList.add("completed");

          // div conteúdo (com checkbox e texto)
          const divContent = document.createElement("div");
          divContent.className = "item-content";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "custom-check";
          checkbox.checked = item.concluido;
          checkbox.addEventListener("change", (e) => {
            item.concluido = e.target.checked;
            salvarCompras();
            renderizarCompras(); // re-render para aplicar classe visual
          });

          const spanText = document.createElement("span");
          spanText.className = "item-text";
          spanText.innerText = item.nome;

          divContent.appendChild(checkbox);
          divContent.appendChild(spanText);

          const btnDelete = document.createElement("button");
          btnDelete.innerHTML = "✕";
          btnDelete.className = "delete-btn";
          btnDelete.title = "Remover item";
          btnDelete.addEventListener("click", () => {
            compras = compras.filter((c) => c.id !== item.id);
            salvarCompras();
            renderizarCompras();
          });

          li.appendChild(divContent);
          li.appendChild(btnDelete);
          comprasListEl.appendChild(li);
        });
      }

      // Renderizar TAREFAS
      function renderizarTarefas() {
        if (!tarefasListEl) return;
        if (tarefas.length === 0) {
          tarefasListEl.innerHTML =
            '<li style="justify-content:center; background:#f1f2f6; border-left-color:#ccc;">📌 Nenhuma tarefa. Adicione suas metas.</li>';
          return;
        }

        tarefasListEl.innerHTML = "";
        tarefas.forEach((item) => {
          const li = document.createElement("li");
          if (item.concluido) li.classList.add("completed");

          const divContent = document.createElement("div");
          divContent.className = "item-content";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "custom-check";
          checkbox.checked = item.concluido;
          checkbox.addEventListener("change", (e) => {
            item.concluido = e.target.checked;
            salvarTarefas();
            renderizarTarefas();
          });

          const spanText = document.createElement("span");
          spanText.className = "item-text";
          spanText.innerText = item.nome;

          divContent.appendChild(checkbox);
          divContent.appendChild(spanText);

          const btnDelete = document.createElement("button");
          btnDelete.innerHTML = "✕";
          btnDelete.className = "delete-btn";
          btnDelete.addEventListener("click", () => {
            tarefas = tarefas.filter((t) => t.id !== item.id);
            salvarTarefas();
            renderizarTarefas();
          });

          li.appendChild(divContent);
          li.appendChild(btnDelete);
          tarefasListEl.appendChild(li);
        });
      }

      // Adicionar compra
      function adicionarCompra() {
        let texto = inputCompra.value.trim();
        if (texto === "") return;
        const novoItem = {
          id: gerarId(),
          nome: texto,
          concluido: false,
        };
        compras.push(novoItem);
        salvarCompras();
        renderizarCompras();
        inputCompra.value = "";
        inputCompra.focus();
      }

      function adicionarTarefa() {
        let texto = inputTarefa.value.trim();
        if (texto === "") return;
        const novaTarefa = {
          id: gerarId(),
          nome: texto,
          concluido: false,
        };
        tarefas.push(novaTarefa);
        salvarTarefas();
        renderizarTarefas();
        inputTarefa.value = "";
        inputTarefa.focus();
      }

      // Remover comprados (compras)
      function removerCompradosCompra() {
        compras = compras.filter((item) => !item.concluido);
        salvarCompras();
        renderizarCompras();
      }

      function limparTodasCompras() {
        if (
          confirm(
            "⚠️ Tem certeza que deseja apagar TODOS os itens da lista de compras?",
          )
        ) {
          compras = [];
          salvarCompras();
          renderizarCompras();
        }
      }

      // Remover concluídas das tarefas
      function removerConcluidasTarefa() {
        tarefas = tarefas.filter((item) => !item.concluido);
        salvarTarefas();
        renderizarTarefas();
      }

      function limparTodasTarefas() {
        if (confirm("⚠️ Tem certeza que deseja apagar TODAS as tarefas?")) {
          tarefas = [];
          salvarTarefas();
          renderizarTarefas();
        }
      }

      // Atalhos de teclado (Enter)
      inputCompra.addEventListener("keypress", (e) => {
        if (e.key === "Enter") adicionarCompra();
      });
      inputTarefa.addEventListener("keypress", (e) => {
        if (e.key === "Enter") adicionarTarefa();
      });

      btnAddCompra.addEventListener("click", adicionarCompra);
      btnAddTarefa.addEventListener("click", adicionarTarefa);
      btnRemoverCompradosCompra.addEventListener(
        "click",
        removerCompradosCompra,
      );
      btnLimparCompras.addEventListener("click", limparTodasCompras);
      btnRemoverConcluidasTarefa.addEventListener(
        "click",
        removerConcluidasTarefa,
      );
      btnLimparTarefas.addEventListener("click", limparTodasTarefas);

      // Inicialização completa
      function init() {
        carregarDados();
        renderizarCompras();
        renderizarTarefas();
      }

      init();
    </script>
  </body>
</html>
